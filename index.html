<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
</head>

<body style="text-align:center; font-family: Arial; background:#74ebd5; padding:40px;">

    <h1>🌤️ Weather App</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city name" required>
        <button type="submit">Get Weather</button>
    </form>

    <br>

    {% if weather %}
        <div style="background:white; display:inline-block; padding:20px; border-radius:10px;">
            <h2>{{ weather.city }}</h2>
            <p>🌡️ Temperature: {{ weather.temp }} °C</p>
            <p>💧 Humidity: {{ weather.humidity }}%</p>
            <p>🌬️ Wind: {{ weather.wind }} m/s</p>
            <p>☁️ Description: {{ weather.desc }}</p>
        </div>
    {% endif %}

    {% if error %}
        <p style="color:red; font-weight:bold;">{{ error }}</p>
    {% endif %}

</body>
</html>
